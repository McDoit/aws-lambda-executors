name: Publish NuGet Packages

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish (for example v1.2.3)
        required: true
        type: string
      dry_run:
        description: Skip pushing packages to NuGet
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example v1.2.3)
        required: true
        type: string
      dry_run:
        description: Skip pushing packages to NuGet
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::release_tag input is required."
            exit 1
          fi

          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::release_tag must start with 'v' (example: v1.2.3)."
            exit 1
          fi

      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: echo "PACKAGE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore ./McDoit.Aws.Lambda.Executors.slnx

      - name: Build
        run: dotnet build ./McDoit.Aws.Lambda.Executors.slnx --configuration Release --no-restore

      - name: Pack NuGet artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          for project in \
            src/McDoit.Aws.Lambda.Executors/McDoit.Aws.Lambda.Executors.csproj \
            src/McDoit.Aws.Lambda.Executors.Sns/McDoit.Aws.Lambda.Executors.Sns.csproj \
            src/McDoit.Aws.Lambda.Executors.Sqs/McDoit.Aws.Lambda.Executors.Sqs.csproj
          do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output artifacts \
              -p:ContinuousIntegrationBuild=true \
              -p:PackageVersion="$PACKAGE_VERSION"
          done

      - name: Ensure NuGet API key is configured
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "::error::NUGET_API_KEY secret is required when dry_run is false."
            exit 1
          fi

      - name: Push packages
        if: ${{ !inputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          shopt -s nullglob
          for package in artifacts/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          done

      - name: Push symbols
        if: ${{ !inputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          shopt -s nullglob
          for symbols in artifacts/*.snupkg; do
            dotnet nuget push "$symbols" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          done
